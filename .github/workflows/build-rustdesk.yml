name: Build RustDesk Client (Portable)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # ✅ Manuell triggern

env:
  CARGO_NET_GIT_FETCH_WITH_CLI: true

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          g++ gcc libasound2-dev libavcodec-dev libavformat-dev \
          libavutil-dev libclang-dev libgtk-3-dev libpulse-dev \
          libswscale-dev libx11-dev libxcb-render0-dev libxcb-shape0-dev \
          libxcb-xfixes0-dev libxdo-dev libxfixes-dev libxrandr-dev \
          libxss-dev libwayland-dev pkg-config libayatana-appindicator3-dev \
          librsvg2-dev patchelf

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build RustDesk Linux (mit deinen Servern)
      env:
        RUSTDESK_ID_SERVER: ${{ secrets.RUSTDESK_ID_SERVER || 'support.myGHL.com:36666' }}
        RUSTDESK_RELAY_SERVER: ${{ secrets.RUSTDESK_RELAY_SERVER || 'support.myGHL.com:8443' }}
        RUSTDESK_API_SERVER: ${{ secrets.RUSTDESK_API_SERVER || 'https://support.myGHL.com' }}
        RUSTDESK_KEY: ${{ secrets.RUSTDESK_KEY || 'hKOqglvkNEtXCHSaxWQ4685okjzNUsVrSYk7EeHk9sQ=' }}
      run: |
        git clone --recursive https://github.com/rustdesk/rustdesk.git
        cd rustdesk
        cargo build --release

    - name: Package portable Linux
      env:
        RUSTDESK_ID_SERVER: ${{ secrets.RUSTDESK_ID_SERVER || 'support.myGHL.com:36666' }}
      run: |
        cd rustdesk
        mv target/release/rustdesk "rustdesk-host=${RUSTDESK_ID_SERVER},key=${RUSTDESK_KEY}"
        tar -czf rustdesk-linux-portable.tar.gz "rustdesk-host=${RUSTDESK_ID_SERVER},key=${RUSTDESK_KEY}"


  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Install vcpkg
      shell: pwsh
      run: |
        git clone https://github.com/Microsoft/vcpkg.git C:/vcpkg
        cd C:/vcpkg
        .\bootstrap-vcpkg.bat
        .\vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static
      env:
        VCPKG_ROOT: C:/vcpkg

    - name: Build RustDesk Windows
      shell: pwsh
      env:
        RUSTDESK_ID_SERVER: ${{ secrets.RUSTDESK_ID_SERVER || 'support.myGHL.com:36666' }}
        RUSTDESK_RELAY_SERVER: ${{ secrets.RUSTDESK_RELAY_SERVER || 'support.myGHL.com:8443' }}
        RUSTDESK_API_SERVER: ${{ secrets.RUSTDESK_API_SERVER || 'https://support.myGHL.com' }}
        RUSTDESK_KEY: ${{ secrets.RUSTDESK_KEY || 'hKOqglvkNEtXCHSaxWQ4685okjzNUsVrSYk7EeHk9sQ=' }}
        VCPKG_ROOT: C:/vcpkg
      run: |
        git clone --recursive https://github.com/rustdesk/rustdesk.git
        cd rustdesk
        cargo build --release

    - name: Package portable Windows
      shell: pwsh
      env:
        RUSTDESK_ID_SERVER: ${{ secrets.RUSTDESK_ID_SERVER || 'support.myGHL.com:36666' }}
        RUSTDESK_KEY: ${{ secrets.RUSTDESK_KEY || 'hKOqglvkNEtXCHSaxWQ4685okjzNUsVrSYk7EeHk9sQ=' }}
      run: |
        cd rustdesk
        $idServer = "${env:RUSTDESK_ID_SERVER}"
        $key = "${env:RUSTDESK_KEY}"
        $newName = "rustdesk-host=${idServer},key=${key}.exe"
        Write-Output "Renaming to: $newName"
        Move-Item -Path "target/release/rustdesk.exe" -Destination $newName
        Compress-Archive -Path $newName -DestinationPath "rustdesk-windows-portable.zip"
        Write-Output "Created: rustdesk-windows-portable.zip"


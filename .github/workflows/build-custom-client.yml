name: Build custom RustDesk (Win/Linux)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *" # täglich um 04:00 UTC

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: rustdesk-custom-windows-x64
            artifact_path: target/release/rustdesk.exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rustdesk-custom-linux-x64
            artifact_path: target/release/rustdesk

    runs-on: ${{ matrix.os }}

    env:
      RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
      RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/scripts
            C:/vcpkg/buildtrees
          key: vcpkg-${{ runner.os }}-${{ hashFiles('**/vcpkg.json') }}
          restore-keys: vcpkg-${{ runner.os }}-

      - name: Install vcpkg (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          git clone https://github.com/Microsoft/vcpkg.git C:/vcpkg
          ./vcpkg/bootstrap-vcpkg.bat
          ./vcpkg/vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static
        env:
          VCPKG_ROOT: C:/vcpkg

      - name: Install deps (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev libclang-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Inject server config
        shell: bash
        run: |
          mkdir -p src/common
          cat > src/common/custom_config.rs << EOF
          pub const RENDEZVOUS_SERVER: &str = r#"${RENDEZVOUS_SERVER}"#;
          pub const RS_PUB_KEY: &str = r#"${RS_PUB_KEY}"#;
          EOF

      - name: Build release
        env:
          VCPKG_ROOT: C:/vcpkg
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

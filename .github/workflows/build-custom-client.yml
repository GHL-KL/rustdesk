name: Build custom RustDesk (Win/Linux)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *" # täglich um 04:00 Uhr

jobs:
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: rustdesk-custom-windows-x64.exe
            artifact_path: target/release/rustdesk.exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rustdesk-custom-linux-x64
            artifact_path: target/release/rustdesk

    runs-on: ${{ matrix.os }}

    env:
      RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
      RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install deps (Linux)
        if: startsWith(matrix.os, 'ubuntu-')
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev

      - name: Install deps (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          choco install -y visualstudio2022buildtools visualstudio2022-workload-vctools

      - name: Inject server config
        shell: bash
        run: |
          cat > src/custom_defaults.rs << 'EOF'
          pub const DEFAULT_RENDEZVOUS_SERVER: &str = "${RENDEZVOUS_SERVER}";
          pub const DEFAULT_RS_PUB_KEY: &str = "${RS_PUB_KEY}";
          EOF

      - name: Build release
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

name: Build RustDesk Portable (Win/Linux)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *" # täglich um 04:00 UTC

jobs:
  build-portable:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: rustdesk-windows-portable
            suffix: exe

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: rustdesk-linux-portable
            suffix: 

    runs-on: ${{ matrix.os }}

    env:
      RENDEZVOUS_SERVER: ${{ secrets.RENDEZVOUS_SERVER }}
      RS_PUB_KEY: ${{ secrets.RS_PUB_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache vcpkg
        uses: actions/cache@v4
        if: matrix.os == 'windows-latest'
        with:
          path: |
            C:/vcpkg/installed
            C:/vcpkg/scripts
            C:/vcpkg/buildtrees
          key: vcpkg-${{ runner.os }}-${{ hashFiles('**/vcpkg.json') }}

      - name: Setup vcpkg (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if (!(Test-Path C:/vcpkg)) {
            git clone https://github.com/Microsoft/vcpkg.git C:/vcpkg
            ./vcpkg/bootstrap-vcpkg.bat
          }
          ./vcpkg/vcpkg install libvpx:x64-windows-static libyuv:x64-windows-static opus:x64-windows-static aom:x64-windows-static
        env:
          VCPKG_ROOT: C:/vcpkg

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libssl-dev libclang-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Build release
        env:
          VCPKG_ROOT: C:/vcpkg
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Create portable binary
        shell: bash
        run: |
          BINARY="rustdesk-${{ matrix.target }}-host=${RENDEZVOUS_SERVER},key=${RS_PUB_KEY}"
          
          if [ "${{ matrix.suffix }}" = "exe" ]; then
            mv target/release/rustdesk.exe "${BINARY}.exe"
            zip -r "${BINARY}.zip" "${BINARY}.exe"
            echo "package=${BINARY}.zip" >> $GITHUB_OUTPUT
          else
            mv target/release/rustdesk "${BINARY}"
            tar -czf "${BINARY}.tar.gz" "${BINARY}"
            echo "package=${BINARY}.tar.gz" >> $GITHUB_OUTPUT
          fi

      - name: Upload portable package
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: rustdesk-*.zip rustdesk-*.tar.gz
          retention-days: 30

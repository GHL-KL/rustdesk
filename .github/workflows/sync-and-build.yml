name: Sync Latest Release and Build

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

# Diese Berechtigungen sind entscheidend für den Sync von Workflows
permissions:
  contents: write
  actions: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync Master to Latest Upstream Tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Neuesten Release-Tag von RustDesk abrufen
          LATEST_TAG=$(gh api repos/rustdesk/rustdesk/releases/latest --jq .tag_name)
          echo "Target Tag: $LATEST_TAG"

          # 2. Den Fork-Master synchronisieren
          # Das Token hat nun durch 'actions: write' die Erlaubnis, Workflows zu überschreiben
          gh repo sync ${{ github.repository }} --source rustdesk/rustdesk --branch master
          
          # 3. Lokalen Stand aktualisieren
          git fetch origin master
          git checkout master
          git reset --hard origin/master

  build:
    needs: sync-and-build
    uses: ./.github/workflows/flutter-build.yml
    with:
      upload-artifact: true
      upload-tag: "latest-release"

name: Sync Latest Release and Build

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_TOKEN_RUSTDESK }}

      - name: Sync Master to Latest Upstream Tag
        env:
          GH_TOKEN: ${{ secrets.SYNC_TOKEN_RUSTDESK }}
        run: |
          # 1. Neuesten Release-Tag von RustDesk abrufen
          LATEST_TAG=$(gh api repos/rustdesk/rustdesk/releases/latest --jq .tag_name)
          echo "Target Tag: $LATEST_TAG"

          # 2. Den Fork-Master synchronisieren
          gh repo sync ${{ github.repository }} --source rustdesk/rustdesk --branch master
          
          # 3. Lokalen Stand aktualisieren
          git fetch origin master
          git checkout master
          git reset --hard origin/master

          # --- NEU: FEHLERHAFTE TARGETS DEAKTIVIEREN ---
          # Dies fügt 'if: false' in die Jobs ein, die macos-13 (retired) nutzen
          sed -i '/build-rustdesk-ios:/a \    if: false' .github/workflows/flutter-build.yml
          sed -i '/x86_64-apple-darwin:/a \    if: false' .github/workflows/flutter-build.yml
          
          # Änderungen committen und in den Fork zurückschieben
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/flutter-build.yml
          git commit -m "ci: disable retired macos-13 builds to prevent error emails" || echo "No changes to commit"
          git push origin master --force

  build:
    needs: sync-and-build
    uses: ./.github/workflows/flutter-build.yml
    with:
      upload-artifact: true
      upload-tag: "latest-release"

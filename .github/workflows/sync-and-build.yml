name: Sync Latest Release and Build

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync-tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync Master to Latest Upstream Tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Neuesten Release-Tag sicher abrufen
          LATEST_TAG=$(gh api repos/rustdesk/rustdesk/releases/latest --jq .tag_name)
          echo "Target Tag: $LATEST_TAG"

          # 2. Git Identität setzen
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 3. Upstream hinzufügen und Master auf Tag zwingen
          git remote add upstream 

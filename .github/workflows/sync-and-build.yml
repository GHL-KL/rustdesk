name: Sync Latest Release and Build

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync Master to Latest Upstream Tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Neuesten Release-Tag von RustDesk abrufen
          LATEST_TAG=$(gh api repos/rustdesk/rustdesk/releases/latest --jq .tag_name)
          echo "Target Tag: $LATEST_TAG"

          # 2. Den Fork-Master direkt via GitHub API auf den Stand des Upstream-Tags setzen
          # Dies vermeidet lokale Git-Fehler komplett
          gh repo sync ${{ github.repository }} --source rustdesk/rustdesk --branch master
          
          # 3. Den lokalen Stand für den Build vorbereiten
          git fetch origin master
          git checkout master
          git reset --hard origin/master

  # Dieser Job startet den eigentlichen Build
  build:
    needs: sync-and-build
    uses: ./.github/workflows/flutter-build.yml
    with:
      upload-artifact: true
      upload-tag: "latest-release"

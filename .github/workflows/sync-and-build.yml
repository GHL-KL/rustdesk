name: Sync Latest Release and Build

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  get-latest-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
    steps:
      - id: set_tag
        run: |
          # Ermittelt den neuesten Release-Tag von RustDesk
          LATEST_TAG=$(curl -s api.github.com | jq -r .tag_name)
          echo "tag=$LATEST_TAG" >> $GITHUB_OUTPUT

  build:
    needs: get-latest-tag
    # Wir rufen den Build-Workflow direkt mit dem gefundenen Tag auf
    uses: rustdesk/rustdesk/.github/workflows/flutter-build.yml@master
    with:
      # Hier sagen wir dem Build-Workflow, welchen Stand er bauen soll
      upload-artifact: true
      upload-tag: "latest-release"
    # WICHTIG: Falls der Workflow von RustDesk 'ref' nicht als Input akzeptiert,
    # bauen wir den Stand Ihres geklonten Tags.

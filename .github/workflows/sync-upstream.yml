name: Sync upstream

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Sync fork with upstream
        uses: tgymnich/fork-sync@v2
        with:
          owner: rustdesk
          repo: rustdesk
          base: master
          head: master
